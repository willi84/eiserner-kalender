name: Daily JSON Export

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Export JSON
        run: npm run export-json

      - name: Print JSON result
        run: cat output/events.json

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: union-events-json
          path: output/events.json
